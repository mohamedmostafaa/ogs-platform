name: secret-scan

# gitleaks runs on every PR and on every push to main.
# Catches accidentally-committed API keys, tokens, and secrets.
# Pair with the local pre-commit hook in .husky/pre-commit.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
