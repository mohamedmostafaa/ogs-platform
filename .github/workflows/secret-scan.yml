name: secret-scan

# gitleaks runs on every PR and every push to main.
# Catches accidentally-committed API keys, tokens, and secrets.
# Pair with the local pre-commit hook in `.husky/pre-commit`.
#
# We install the gitleaks binary directly rather than using
# `gitleaks/gitleaks-action@v2`, which since v2 requires a paid
# `GITLEAKS_LICENSE` for private repos.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.21.2
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: |
          set -euo pipefail
          # PRs: scan only the diff vs base (faster, focused).
          # Pushes to main: scan the full repo + history.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            gitleaks detect \
              --no-banner \
              --redact \
              --verbose \
              --exit-code 1 \
              --log-opts="origin/${{ github.base_ref }}..HEAD"
          else
            gitleaks detect \
              --no-banner \
              --redact \
              --verbose \
              --exit-code 1
          fi
