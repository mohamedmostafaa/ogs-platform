name: verify-no-dead-names

# Scans the PR diff for legacy API names from majors that have been bumped.
# Catches an agent who copy-pasted a stale snippet from older docs.
#
# Patterns checked match blueprint §3.1.1 (Notable major-bump migration notes).

on:
  pull_request:
  push:
    # Backstop for direct pushes to main (merge-queue, admin force-push,
    # etc.) so the scan can't be bypassed.
    branches: [main]

jobs:
  scan:
    name: No dead-name patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Scan added lines for dead names
        shell: bash
        run: |
          # On PR: diff the PR's base..head. On push: diff the push's
          # before..sha so we catch any forbidden patterns landing
          # directly on main via merge-queue / admin push.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            # First-push to a fresh branch has BASE=0000...; in that
            # case diff against an empty tree.
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE=$(git hash-object -t tree /dev/null)
            fi
          fi
          # Diff only added lines (+) under apps/** or packages/**
          # The exclusion paths keep the blueprint, security charter, and code-reviewer
          # checklist out of the scan, since they intentionally name these patterns
          # to warn against them.
          ADDED=$(git diff "$BASE" "$HEAD" -- 'apps/**' 'packages/**' \
                  ':!packages/db/prisma/schema/**' \
                  | grep -E '^\+' | grep -v '^\+\+\+' | sed 's/^\+//')

          # Parallel-array dispatch so attribution is deterministic regardless of
          # bash version's associative-array iteration order. Each PATTERNS[i]
          # has a matching MESSAGES[i].
          PATTERNS=(
            'middleware\.ts'
            'export function middleware'
            'NextMiddleware'
            'skipMiddlewareUrlNormalize'
            'experimental\.middleware'
            'runtime:\s*["'"'"']edge["'"'"']'
            'prisma-client-js'
            'datasource db \{[^}]*url\s*='
            'import \{ generateObject'
            'CoreMessage'
            'textEmbeddingModel'
            'oidcProvider'
            'apiVersion: "2024-10-28\.acacia'
            ', *\{ event:'
            'PanelGroup\b'
            'PanelResizeHandle'
            'fromMonth="|toMonth="|fromYear=|toYear='
            'import \{ MessageInput'
            'useMessageInputContext'
            'withChannelStateContext|withChatContext|withMessageContext'
            '\.eslintrc'
          )
          MESSAGES=(
            'middleware.ts → proxy.ts (Next.js 16)'
            'export function middleware → export function proxy (Next.js 16)'
            'NextMiddleware type → NextProxy (Next.js 16)'
            'skipMiddlewareUrlNormalize → skipProxyUrlNormalize (Next.js 16)'
            'experimental.middleware → experimental.proxy (Next.js 16)'
            'runtime: "edge" on a route/page — proxy.ts must declare runtime separately, app routes default to Node runtime (Next.js 16)'
            'prisma-client-js → prisma-client (Prisma 7)'
            'datasource db { url = ... } — Prisma 7 moves url/directUrl to prisma.config.ts'
            'generateObject → generateText({ output: ... }) (Vercel AI SDK v6)'
            'CoreMessage → ModelMessage (Vercel AI SDK v6)'
            'textEmbeddingModel → embeddingModel (Vercel AI SDK v6)'
            'oidcProvider → oauthProvider (@better-auth/oauth-provider 1.6)'
            'Stripe apiVersion 2024-10-28.acacia → 2026-03-25.dahlia (Stripe 22)'
            '3-arg createFunction → 2-arg with triggers in options (Inngest 4)'
            'PanelGroup → Group (react-resizable-panels 4)'
            'PanelResizeHandle → Separator (react-resizable-panels 4)'
            'fromMonth/toMonth/fromYear/toYear → startMonth/endMonth/hidden (react-day-picker 10)'
            'MessageInput → MessageComposer (stream-chat-react 14)'
            'useMessageInputContext → useMessageComposerContext (stream-chat-react 14)'
            'HOC wrappers removed; use hooks (stream-chat-react 14)'
            '.eslintrc removed; flat config only (ESLint 10)'
          )

          fail=0
          for i in "${!PATTERNS[@]}"; do
            pattern="${PATTERNS[$i]}"
            message="${MESSAGES[$i]}"
            if echo "$ADDED" | grep -E -q -- "$pattern"; then
              echo "::error::Forbidden pattern '$pattern' introduced — $message"
              fail=1
            fi
          done

          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "One or more dead-name patterns from older majors were introduced."
            echo "See blueprint §3.1.1 and CODE_STANDARDS.md §0.1."
            exit 1
          fi

          echo "OK — no dead-name patterns in this PR."
