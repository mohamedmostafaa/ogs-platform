# pnpm dev — single-command bring-up of the entire OGS platform locally.
# Each app gets a fixed port so cross-domain SSO testing is deterministic.
#
# Inngest devserver, workers, and Prisma Studio are commented out until
# their packages land in Phase 01 — uncomment as each ships.
#
# @see Blueprint §4.9, docs/runbooks/local-dev.md.
procs:
  id:
    cwd: apps/id
    cmd: ["pnpm", "dev"]
  careers:
    cwd: apps/careers
    cmd: ["pnpm", "dev"]
  skillpass:
    cwd: apps/skillpass
    cmd: ["pnpm", "dev"]
  academy:
    cwd: apps/academy
    cmd: ["pnpm", "dev"]
  eco:
    cwd: apps/eco
    cmd: ["pnpm", "dev"]
  enterprise:
    cwd: apps/enterprise
    cmd: ["pnpm", "dev"]
  admin:
    cwd: apps/admin
    cmd: ["pnpm", "dev"]
  corporate:
    cwd: apps/corporate
    cmd: ["pnpm", "dev"]

  # ---- Re-enable as each package lands ------------------------------------
  # workers:
  #   cwd: apps/workers
  #   cmd: ["pnpm", "dev"]
  # inngest:
  #   cmd: ["pnpm", "inngest:dev"]
  # prisma:
  #   cmd: ["pnpm", "db:studio"]
